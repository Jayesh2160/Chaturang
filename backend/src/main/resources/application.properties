spring.application.name=chaturang-backend
server.port=8080

# Load local environment variables from .env file if present (useful for local development)
spring.config.import=optional:file:.env[.properties]

# Database Configuration (Neon PostgreSQL)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JWT Configurations
chaturang.jwt.secret=${JWT_SECRET}
chaturang.jwt.expiration-ms=${JWT_EXPIRATION}

# CORS Configuration
chaturang.cors.frontend-url=${FRONTEND_URL:http://localhost:5173}
