spring.application.name=chaturang-backend
server.port=8080

# Database Configuration (H2 In-Memory for automated tests)
spring.datasource.url=jdbc:h2:mem:chaturang;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JWT Configurations (Local test dummy values)
